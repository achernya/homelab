cilium:
  cluster:
    # Cluster's default name is "kubernetes", not "default"
    name: "kubernetes"
  # Cluster is deployed with kubeproxy-free
  kubeProxyReplacement: strict
  # Enable hubble
  hubble:
    enabled: true
    # Export metrics to prometheus
    metrics:
      enabled:
        - dns
        - drop
        - tcp
        - icmp
        - "flow:sourceContext=workload-name|reserved-identity;destinationContext=workload-name|reserved-identity"
        - "httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction;sourceContext=workload-name|reserved-identity;destinationContext=workload-name|reserved-identity"
      serviceMonitor:
        enabled: true
        labels: {"release": "monitoring"}
      dashboards:
        enabled: true
        namespace: monitoring
        annotations:
          grafana_folder: "Hubble"
    relay:
      # Enable hubble relay (required by Hubble UI)
      enabled: true
      prometheus:
        enabled: true
        serviceMonitor:
          enabled: true
          labels: {"release": "monitoring"}
    # Enable Hubble UI
    ui:
      enabled: true
  # Enable prometheus monitoring (on the agents)
  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true
      labels: {"release": "monitoring"}
  # Enable prometheus monitoring on the operator
  operator:
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true
        labels: {"release": "monitoring"}
